name: codex-auto-fix

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
    - name: Checkout branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    
    - name: Install dependencies
      run: npm ci

    - name: Run tests (capture logs)
      run: |
        mkdir -p test-logs
        npm test 2>&1 | tee test-logs/test-output.log

    - name: Debug files
      run: |
        pwd
        ls -la
        ls -R .codex || echo "NO CODEX DIR"
        ls .codex/commands || echo "NO COMMANDS DIR"
        cat .codex/commands/fix-ci.md || echo "NO PROMPT FILE"

    - name: Debug OPENAI_API_KEY
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "API key is missing!"
          exit 1
        else
          echo "API key exists!"
        fi
    
    - name: Run Codex (non-interactive)
      id: run_codex
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ env.OPENAI_API_KEY }}
        prompt-file: .codex/commands/fix-ci.md
    
    - name: Rerun tests
      run: npm test
    
    - name: Commit and push changes
      run: |
        git config user.name "codex-autofix-bot"
        git config user.email "codex-autofix-bot@users.noreply.github.com"
        git add -A
        git commit -m "autofix: make CI green" || exit 0
        git push